version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    pre_install:
      - python -m pip install "sphinx>=7,<7.3" "myst-nb>=1.1,<1.2" "myst-parser>=2,<3"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
